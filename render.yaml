services:
  - type: web
    name: northstar-api
    runtime: docker
    dockerfilePath: ./backend/NorthStarShelter.API/Dockerfile
    dockerContext: ./
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: FrontendUrl
        sync: false
