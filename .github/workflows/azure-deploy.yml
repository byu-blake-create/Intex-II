name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore & Publish
        run: |
          dotnet restore backend/NorthStarShelter.API/NorthStarShelter.API.csproj
          dotnet publish backend/NorthStarShelter.API/NorthStarShelter.API.csproj \
            -c Release \
            -o ./publish

      - name: Trim publish artifact for Windows App Service
        run: |
          rm -rf ./publish/runtimes/android
          rm -rf ./publish/runtimes/ios
          rm -rf ./publish/runtimes/linux-arm64
          rm -rf ./publish/runtimes/linux-x64
          rm -rf ./publish/runtimes/osx-arm64
          rm -rf ./publish/runtimes/unix
          rm -rf ./publish/runtimes/win-arm64
          rm -rf ./publish/runtimes/win-x86

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: northstar-shelter-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
